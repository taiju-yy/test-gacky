AWSTemplateFormatVersion: '2010-09-09'
Description: 'SQS Queue and DynamoDB Tables for LINE Bot Broadcast Messages'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment (dev or prod)

Resources:
  # Main SQS Queue
  BroadcastMessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'gacky-bot-broadcast-queue-${Environment}'
      VisibilityTimeout: 300  # 5 minutes, should match Lambda timeout
      MessageRetentionPeriod: 1209600  # 14 days (maximum)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BroadcastDeadLetterQueue.Arn
        maxReceiveCount: 5  # Number of processing attempts before sending to DLQ
      # Optional encryption with KMS
      # KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Project
          Value: GackyBot
  
  # Broadcast Logs Table for tracking broadcast deliveries
  BroadcastLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'gacky-bot-broadcast-logs-${Environment}'
      BillingMode: PAY_PER_REQUEST  # On-demand pricing
      AttributeDefinitions:
        - AttributeName: broadcastId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: broadcastId
          KeyType: HASH  # Partition key
        - AttributeName: timestamp
          KeyType: RANGE  # Sort key
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: GackyBot
        - Key: Purpose
          Value: BroadcastLogs

  # Dead Letter Queue for failed messages
  BroadcastDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'gacky-bot-broadcast-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days (maximum)
      # Optional encryption with KMS
      # KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Project
          Value: GackyBot

  # IAM Role for Lambda to access SQS
  LambdaSQSRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:SendMessageBatch
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                  - sqs:DeleteMessageBatch
                Resource:
                  - !GetAtt BroadcastMessageQueue.Arn
                  - !GetAtt BroadcastDeadLetterQueue.Arn
        - PolicyName: BroadcastLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt BroadcastLogsTable.Arn

Outputs:
  BroadcastLogsTableName:
    Description: Name of the Broadcast Logs Table
    Value: !Ref BroadcastLogsTable
    Export:
      Name: GackyBotBroadcastLogsTableName
  
  BroadcastLogsTableArn:
    Description: ARN of the Broadcast Logs Table
    Value: !GetAtt BroadcastLogsTable.Arn
    Export:
      Name: GackyBotBroadcastLogsTableArn

  QueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref BroadcastMessageQueue
    Export:
      Name: GackyBotBroadcastQueueUrl
  
  QueueArn:
    Description: ARN of the SQS Queue
    Value: !GetAtt BroadcastMessageQueue.Arn
    Export:
      Name: GackyBotBroadcastQueueArn
  
  DeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref BroadcastDeadLetterQueue
    Export:
      Name: GackyBotBroadcastDLQUrl
  
  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt BroadcastDeadLetterQueue.Arn
    Export:
      Name: GackyBotBroadcastDLQArn
  
  LambdaRoleArn:
    Description: ARN of the Lambda Role
    Value: !GetAtt LambdaSQSRole.Arn
    Export:
      Name: GackyBotLambdaSQSRoleArn